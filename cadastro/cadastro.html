<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>
<p>Formulário de cadastro de alunos.</p>
<form action="sucesso.html" method="get">
<form action="/enviar-dados" method="POST">
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" required placeholder="Nome completo">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="E-mail">
    
    <label for="idade">Idade</label>
    <input type="idade" id="idade" name="idade" required placeholder="Idade">

    <label for="curso">Curso</label>
    <input type="curso" id="curso" name="curso" required placeholder="Curso escolhido">
    
    <label for="turno">Turno</label>
    <input type="turno" id="turno" name="turno" required placeholder="Turno">
    
    <label for="interesses">Interesses</label>
    <input type="interesses" id="interesses" name="interesses" required placeholder="Interesses">

    <button type="submit" value="Enviar dados">Enviar dados</button>
    <button><a href="index.html">Voltar para o início</a>
</form>
